name: SamanthaTranslate
options:
  bundleIdPrefix: com.alexmitre
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: "8UTGJ9D5B6"
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "11"
packages:
  WebRTC:
    url: https://github.com/stasel/WebRTC.git
    from: "147.0.0"
targets:
  SamanthaTranslate:
    type: application
    platform: iOS
    sources:
      - SamanthaTranslate
    dependencies:
      - package: WebRTC
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alexmitre.samanthatranslate
        PRODUCT_NAME: Samantha Translate
        INFOPLIST_FILE: SamanthaTranslate/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: false
    scheme:
      testTargets: []
      storeKitConfiguration: StoreKit/SamanthaTranslate.storekit
